name: Dependency Rollback Guard

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  verify-and-rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        id: build
        continue-on-error: true
        run: npm run build

      - name: Rollback failed dependency bump
        if: steps.build.outcome == 'failure' && contains(github.event.head_commit.message, 'Bump ')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert --no-edit HEAD
          git push
